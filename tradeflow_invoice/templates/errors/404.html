{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="text-center py-16">
    <h1 class="text-9xl font-bold text-primary-600 dark:text-primary-400">404</h1>
    <p class="text-2xl text-gray-600 dark:text-gray-300 mb-8">Page Not Found</p>
    <p class="text-gray-500 dark:text-gray-400 mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="inline-block bg-primary-600 hover:bg-primary-700 text-white font-medium py-2 px-6 rounded-lg transition-colors">
        Go Home
    </a>
</div>
{% endblock %}
